---
layout: default
---

<style>
  /* ── Shell ───────────────────────────────────────────────── */
  .cart-page-header {
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(74, 48, 32, 0.1);
    margin-bottom: 2.5rem;
  }

  .cart-page-eyebrow {
    display: inline-block;
    padding: 0.22rem 0.7rem;
    border-radius: 999px;
    background: var(--chili-blush);
    color: var(--deep-chili);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  .cart-page-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.3px;
    line-height: 1.1;
    margin: 0;
  }

  /* ── Main layout ─────────────────────────────────────────── */
  .cart-shell {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 2.5rem;
    align-items: start;
  }

  /* ── Cart items list ─────────────────────────────────────── */
  .cart-left {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .cart-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .cart-item {
    display: grid;
    grid-template-columns: 80px 1fr auto auto auto;
    gap: 1.2rem;
    align-items: center;
    background: #fff;
    border: 1px solid rgba(74, 48, 32, 0.08);
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    box-shadow: 0 2px 12px rgba(28, 16, 7, 0.05);
  }

  .cart-item-img-wrap {
    width: 80px;
    height: 80px;
    background: var(--cream);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .cart-item-img-wrap img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  .cart-item-info {
    min-width: 0;
  }

  .cart-item-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cart-item-weight {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
    margin: 0 0 0.2rem;
  }

  .cart-item-unit {
    font-size: 0.85rem;
    color: var(--earth);
    margin: 0;
  }

  /* ── Qty controls ────────────────────────────────────────── */
  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .qty-btn {
    width: 30px;
    height: 30px;
    border: 1px solid rgba(74, 48, 32, 0.18);
    background: var(--cream);
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    padding: 0;
  }

  .qty-btn:hover {
    border-color: var(--chili-red);
    background: var(--chili-blush);
  }

  .qty-input {
    width: 46px;
    height: 30px;
    border: 1px solid rgba(74, 48, 32, 0.18);
    border-radius: 6px;
    text-align: center;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.88rem;
    color: var(--ink);
    background: #fff;
    -moz-appearance: textfield;
  }

  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .cart-item-line-total {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    min-width: 70px;
    text-align: right;
    flex-shrink: 0;
  }

  .cart-item-remove {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--mist);
    font-size: 0.85rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    padding: 0;
    flex-shrink: 0;
  }

  .cart-item-remove:hover {
    color: var(--chili-red);
    background: var(--chili-blush);
  }

  /* ── Shipping form ───────────────────────────────────────── */
  .shipping-section {
    background: #fff;
    border: 1px solid rgba(74, 48, 32, 0.08);
    border-radius: 14px;
    padding: 1.4rem 1.4rem 1.6rem;
    box-shadow: 0 2px 12px rgba(28, 16, 7, 0.05);
  }

  .shipping-section-title {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--saffron-gold);
    margin: 0 0 1.1rem;
  }

  .shipping-form {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.85rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .form-label {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .form-input {
    padding: 0.62rem 0.85rem;
    border: 1px solid rgba(74, 48, 32, 0.18);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }

  .form-input:focus {
    border-color: var(--chili-red);
    background: #fff;
  }

  .form-input::placeholder { color: rgba(138, 112, 96, 0.45); }

  .form-input.input-error {
    border-color: var(--chili-red);
    background: #fff5f3;
  }

  .form-input.input-error:focus {
    background: #fff;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  .shipping-section.shake {
    animation: shake 0.4s ease;
    outline: 2px solid var(--chili-red);
    outline-offset: 2px;
  }

  /* ── Summary panel ───────────────────────────────────────── */
  .cart-summary {
    background: #fff;
    border: 1px solid rgba(74, 48, 32, 0.08);
    border-radius: 16px;
    padding: 1.6rem;
    box-shadow: 0 4px 24px rgba(28, 16, 7, 0.07);
    position: sticky;
    top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .cart-summary-label {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--saffron-gold);
    margin: 0 0 0.25rem;
  }

  .cart-summary-rows {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    font-size: 0.88rem;
    color: var(--earth);
  }

  .cart-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.75rem;
  }

  .cart-summary-row span:first-child {
    flex: 1;
    min-width: 0;
  }

  .cart-summary-row span:last-child {
    flex-shrink: 0;
    white-space: nowrap;
    text-align: right;
  }

  .cart-subtotal-row,
  .cart-shipping-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.88rem;
    color: var(--earth);
  }

  .cart-subtotal-row {
    border-top: 1px solid rgba(74, 48, 32, 0.1);
    padding-top: 0.6rem;
  }

  .shipping-free-badge {
    background: var(--green-soft);
    color: var(--herb-green);
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.18rem 0.55rem;
    border-radius: 999px;
  }

  .shipping-nudge {
    background: var(--gold-soft);
    border: 1px solid rgba(201, 138, 45, 0.2);
    border-radius: 8px;
    padding: 0.55rem 0.85rem;
    font-size: 0.78rem;
    color: var(--earth);
    text-align: center;
    line-height: 1.45;
  }

  .shipping-nudge.shipping-free-unlocked {
    background: var(--green-soft);
    border-color: rgba(58, 107, 53, 0.2);
    color: var(--herb-green);
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(74, 48, 32, 0.1);
    padding-top: 0.75rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--ink);
  }

  .cart-cta-stack {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 0.25rem;
  }

  .cart-btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: #128c7e;
    color: #fff !important;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.85rem 1rem;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(18, 140, 126, 0.3);
    transition: background 0.2s;
    text-align: center;
  }

  .cart-btn-wa:hover { background: #0a6d61; }

  .cart-btn-email {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--earth) !important;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.82rem 1rem;
    border-radius: 10px;
    border: 1px solid rgba(74, 48, 32, 0.2);
    transition: border-color 0.2s;
    text-align: center;
  }

  .cart-btn-email:hover { border-color: var(--chili-red); color: var(--chili-red) !important; }

  .cart-clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--mist);
    font-size: 0.75rem;
    font-family: 'DM Mono', ui-monospace, monospace;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 0.25rem;
    margin-top: 0.25rem;
    transition: color 0.15s;
  }

  .cart-clear-btn:hover { color: var(--chili-red); }

  /* ── Empty state ─────────────────────────────────────────── */
  .cart-empty {
    text-align: center;
    padding: 5rem 2rem;
  }

  .cart-empty-icon {
    font-size: 3.5rem;
    margin-bottom: 1.2rem;
  }

  .cart-empty h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }

  .cart-empty p {
    color: var(--mist);
    font-size: 1rem;
    margin-bottom: 1.8rem;
  }

  .cart-empty-cta {
    display: inline-block;
    background: var(--chili-red);
    color: #fff !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    padding: 0.85rem 1.6rem;
    border-radius: 8px;
  }

  .cart-empty-cta:hover { background: var(--deep-chili); }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 860px) {
    .cart-shell {
      grid-template-columns: 1fr;
    }

    .cart-summary {
      position: static;
    }
  }

  @media (max-width: 640px) {
    /* Tighter page header */
    .cart-page-title { font-size: 1.6rem; }

    .form-row { grid-template-columns: 1fr; }
 Compact 2-row grid: [img spans rows] | [info] [remove]
                           [img spans rows] | [qty]  [total]  */
    .cart-item {
      grid-template-columns: 64px 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.35rem 0.75rem;
      padding: 0.85rem;
    }

    .cart-item-img-wrap {
      grid-column: 1;
      grid-row: 1 / 3;
      width: 64px;
      height: 64px;
      align-self: start;
    }

    .cart-item-info {
      grid-column: 2;
      grid-row: 1;
    }

    .cart-item-title  { font-size: 0.9rem; }
    .cart-item-weight { font-size: 0.6rem; }
    .cart-item-unit   { font-size: 0.78rem; }

    .cart-item-remove {
      grid-column: 3;
      grid-row: 1;
      align-self: start;
      margin-top: -2px;
    }

    .cart-item-controls {
      grid-column: 2;
      grid-row: 2;
      align-self: center;
    }

    .qty-btn  { width: 26px; height: 26px; font-size: 0.85rem; }
    .qty-input { width: 38px; height: 26px; font-size: 0.8rem; }

    .cart-item-line-total {
      grid-column: 3;
      grid-row: 2;
      align-self: center;
      font-size: 0.95rem;
      min-width: auto;
    }

    /* Summary panel */
    .cart-summary { padding: 1.2rem; }
  }
</style>

<div class="cart-page-header">
  <span class="cart-page-eyebrow">&#x1F6D2; Shopping cart</span>
  <h1 class="cart-page-title">Your Cart</h1>
</div>

<div id="cart-root">
  <!-- Rendered by cart.js on DOMContentLoaded -->
  <div class="cart-empty">
    <p class="cart-empty-icon">&#x1F6D2;</p>
    <h2>Your cart is empty</h2>
    <p>Browse our noodles and add something delicious.</p>
    <a href="/products/" class="cart-empty-cta">Browse noodles &rarr;</a>
  </div>
</div>
